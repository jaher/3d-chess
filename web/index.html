<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080, initial-scale=1">
  <title>3D Chess</title>
  <style>
    html, body {
      margin: 0;
      background: #1a1a1a;
      color: #ddd;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #chess-status {
      padding: 8px 12px;
      text-align: center;
      font: 14px/1 monospace;
      color: #cfcfcf;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
    }
    #canvas-wrap {
      display: flex;
      justify-content: center;
      padding: 8px 0;
    }
    #canvas {
      display: block;
      background: #000;
      max-width: 100%;
      height: auto;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: #888;
      padding: 8px;
    }
    .footer a { color: #aaa; }
  </style>
</head>
<body>
  <div id="chess-status">Loading…</div>
  <div id="canvas-wrap">
    <canvas id="canvas" width="1024" height="768"
            oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
  <div class="footer">
    Powered by <a href="https://stockfishchess.org/">Stockfish</a>
    via <a href="https://github.com/nmrugg/stockfish.js">stockfish.js</a>
    · <a href="https://github.com/jaher/3d-chess">source</a>
  </div>

  <!-- Stockfish bridge must be defined BEFORE the WASM module loads, so the
       WASM side can call into StockfishBridge from main(). -->
  <script src="stockfish-bridge.js"></script>

  <script>
    var Module = {
      canvas: (function() {
        var c = document.getElementById('canvas');
        // Steal keyboard focus so SDL_KEYDOWN events arrive.
        c.addEventListener('click', function() { c.focus(); });
        return c;
      })(),
      print: function(text) { console.log(text); },
      printErr: function(text) { console.warn(text); },
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
