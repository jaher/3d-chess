<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <title>3D Chess</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #1a1a1a;
      color: #ddd;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    #chess-status {
      flex: 0 0 auto;
      padding: 8px 12px;
      text-align: center;
      font: 14px/1 monospace;
      color: #cfcfcf;
      background: #111;
      border-bottom: 1px solid #2a2a2a;
    }
    #canvas-wrap {
      /* Take the entire space between status and footer. The canvas is
         absolutely positioned inside so its intrinsic 1024x768 doesn't
         force the parent to be at least that tall. */
      flex: 1 1 auto;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }
    #canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: block;
      background: #000;
      /* width/height (both CSS and drawing buffer) set by JS resizeCanvas() */
    }
    .footer {
      flex: 0 0 auto;
      text-align: center;
      font-size: 12px;
      color: #888;
      padding: 8px;
    }
    .footer a { color: #aaa; }
  </style>
</head>
<body>
  <div id="chess-status">Loading…</div>
  <div id="canvas-wrap">
    <!-- Start at 1x1 so the canvas's intrinsic size doesn't force the
         flex layout to allocate 1024x768 of space before resizeCanvas()
         can set it to fit the actual viewport. -->
    <canvas id="canvas" width="1" height="1"
            oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>
  <div class="footer">
    Powered by <a href="https://stockfishchess.org/">Stockfish</a>
    via <a href="https://github.com/nmrugg/stockfish.js">stockfish.js</a>
    · <a href="https://github.com/jaher/3d-chess">source</a>
  </div>

  <!--
    Cache-busting. __BUILD_HASH__ is replaced by the Makefile post-link
    step with the current git short SHA (or a timestamp as a fallback).
    Each deploy gets a new value so returning users always fetch fresh
    chess.js / chess.wasm / chess.data / stockfish-bridge.js, while
    unchanged deploys keep their ETags and hit the fast 304 path.

    Every asset the page loads dynamically has the '?v=<HASH>' suffix
    appended, including:
      - stockfish-bridge.js (loaded via a hand-written <script> below)
      - chess.js            (loaded via a hand-written <script> below,
                             replacing the Emscripten SCRIPT shell macro)
      - chess.wasm          (loaded by chess.js; Module.locateFile hook)
      - chess.data          (the preloaded --preload-file package; same
                             Module.locateFile hook)
    We intentionally do NOT cache-bust stockfish/stockfish.{js,wasm} —
    that's vendored and only changes when we bump the submodule, which
    is rare enough that the Pages default 10 min HTML TTL handles it.
  -->
  <script>
    // Replaced by web/Makefile at link time (see BUILD_HASH).
    window.__BUILD_HASH = '__BUILD_HASH__';
  </script>

  <script>
    var statusEl = document.getElementById('chess-status');
    function setLoadingStatus(s) { if (statusEl) statusEl.textContent = s; }
    setLoadingStatus('Initializing module…');

    // Resize the canvas backing store + CSS size to fit the available
    // viewport while keeping the renderer's 4:3 aspect ratio. Notify the
    // C++ side via the exported chess_resize() entry point so the GL
    // viewport and projection matrix follow.
    var ASPECT = 4 / 3;
    var lastBufW = 0, lastBufH = 0;

    function resizeCanvas() {
      var canvas = document.getElementById('canvas');
      var wrap = document.getElementById('canvas-wrap');
      var availW = wrap.clientWidth;
      var availH = wrap.clientHeight;
      if (availW <= 0 || availH <= 0) return;

      // Letterbox/pillar-box to fit aspect.
      var cssW = availW;
      var cssH = availW / ASPECT;
      if (cssH > availH) {
        cssH = availH;
        cssW = availH * ASPECT;
      }

      canvas.style.width  = cssW + 'px';
      canvas.style.height = cssH + 'px';

      // Cap DPR at 2 — high-DPI mobile screens (the Z Fold reports ~2.6)
      // would create an enormous backbuffer for no perceptible visual
      // gain on a 3D scene that's already supersampled by MSAA.
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var bufW = Math.max(1, Math.round(cssW * dpr));
      var bufH = Math.max(1, Math.round(cssH * dpr));

      if (bufW === lastBufW && bufH === lastBufH) return;
      canvas.width  = bufW;
      canvas.height = bufH;
      lastBufW = bufW;
      lastBufH = bufH;

      if (typeof Module !== 'undefined' && Module._chess_resize) {
        Module._chess_resize(bufW, bufH);
      }
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', resizeCanvas);

    var Module = {
      canvas: (function() {
        var c = document.getElementById('canvas');
        c.addEventListener('click', function() { c.focus(); });
        return c;
      })(),
      // Cache-bust the binary artifacts that chess.js fetches at
      // runtime (chess.wasm and the --preload-file data package,
      // chess.data). Non-matching filenames fall through unchanged.
      locateFile: function (path, prefix) {
        if (path === 'chess.wasm' || path === 'chess.data') {
          return (prefix || '') + path + '?v=' + window.__BUILD_HASH;
        }
        return (prefix || '') + path;
      },
      print: function(text) { console.log('[wasm]', text); },
      printErr: function(text) { console.warn('[wasm]', text); },

      // Surface preload progress in the status bar so we can tell
      // "still downloading assets" from "crashed".
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        if (left > 0) {
          setLoadingStatus('Loading assets… ' +
            (this.totalDependencies - left) + ' / ' + this.totalDependencies);
        } else {
          setLoadingStatus('Starting…');
        }
      },
      setStatus: function(text) {
        if (text) {
          var m = text.match(/\((\d+)\/(\d+)\)/);
          if (m) {
            var pct = Math.round(100 * parseInt(m[1], 10) / parseInt(m[2], 10));
            setLoadingStatus('Downloading data… ' + pct + '%');
          } else {
            setLoadingStatus(text);
          }
        }
      },
      onAbort: function(what) {
        setLoadingStatus('Aborted: ' + what);
        console.error('Module aborted:', what);
      },
      onRuntimeInitialized: function() {
        console.log('[wasm] runtime initialized — calling chess_start()');
        setLoadingStatus('Runtime initialized — starting chess_start()…');
        try {
          Module.ccall('chess_start', 'number', [], []);
        } catch (e) {
          // emscripten_set_main_loop(simulate_infinite_loop=1) intentionally
          // throws ("unwind") to bail out of main(). Anything else is real.
          var msg = (e && e.message) ? String(e.message) : String(e);
          if (msg.indexOf('unwind') === -1) {
            console.error('chess_start failed:', e);
            setLoadingStatus('chess_start failed: ' + msg);
            return;
          }
        }
        // Run AFTER the try/catch so it fires regardless of whether
        // chess_start unwound. Schedule via setTimeout(0) so it lands in
        // a fresh task after the current event-loop tick — by then SDL
        // has finished its initial canvas setup.
        resizeCanvas();
        setTimeout(resizeCanvas, 0);
        setTimeout(resizeCanvas, 100);
      },
    };

    // Initial sizing as soon as layout is ready, before WASM has even
    // loaded — keeps the canvas from briefly showing at 1x1.
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', resizeCanvas);
    } else {
      resizeCanvas();
    }

    // Sequential script loader. stockfish-bridge.js must be parsed
    // before chess.js fires its onRuntimeInitialized callback,
    // because that callback ultimately leads to C++ code in
    // ai_player_web.cpp calling window.StockfishBridge.
    (function () {
      var v = '?v=' + window.__BUILD_HASH;
      function loadScript(src, cb) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = cb || null;
        s.onerror = function () {
          setLoadingStatus('Failed to load ' + src);
          console.error('Failed to load', src);
        };
        document.body.appendChild(s);
      }
      loadScript('stockfish-bridge.js' + v, function () {
        loadScript('chess.js' + v);
      });
    })();
  </script>
  <!--
    Emscripten asserts that '{{{ SCRIPT }}}' exists literally in the
    shell file. Keeping it inside an HTML comment still satisfies the
    assertion while making the expanded <script> tag inert, so our
    dynamic loader above is the only thing that actually fetches
    chess.js. DO NOT remove: em++ will refuse to build otherwise.
    {{{ SCRIPT }}}
  -->
</body>
</html>
